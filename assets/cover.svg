<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0d14"/>
      <stop offset="60%"  stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="25%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#e63946" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="80%" cy="50%" r="35%">
      <stop offset="0%"   stop-color="#ff8c42" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff8c42" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dropG" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#e63946"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgMain)"/>
  <rect width="1280" height="640" fill="url(#glowLeft)"/>
  <rect width="1280" height="640" fill="url(#glowRight)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0"    y1="80"  x2="1280" y2="80"/>
    <line x1="0"    y1="160" x2="1280" y2="160"/>
    <line x1="0"    y1="240" x2="1280" y2="240"/>
    <line x1="0"    y1="320" x2="1280" y2="320"/>
    <line x1="0"    y1="400" x2="1280" y2="400"/>
    <line x1="0"    y1="480" x2="1280" y2="480"/>
    <line x1="0"    y1="560" x2="1280" y2="560"/>
    <line x1="160"  y1="0"   x2="160"  y2="640"/>
    <line x1="320"  y1="0"   x2="320"  y2="640"/>
    <line x1="480"  y1="0"   x2="480"  y2="640"/>
    <line x1="640"  y1="0"   x2="640"  y2="640"/>
    <line x1="800"  y1="0"   x2="800"  y2="640"/>
    <line x1="960"  y1="0"   x2="960"  y2="640"/>
    <line x1="1120" y1="0"   x2="1120" y2="640"/>
  </g>

  <!-- Vertical divider line -->
  <line x1="400" y1="80" x2="400" y2="560" stroke="#e63946" stroke-width="1" opacity="0.2"/>

  <!-- ─── LEFT SIDE: Logo ─── -->

  <!-- Logo circle bg -->
  <circle cx="200" cy="320" r="155" fill="#111827" opacity="0.8"/>
  <circle cx="200" cy="320" r="153" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.5"/>

  <!-- Drop shape -->
  <path d="M200 210 C200 210 140 278 140 318 C140 351 167 376 200 376 C233 376 260 351 260 318 C260 278 200 210 200 210 Z"
        fill="url(#dropG)" filter="url(#softGlow)"/>

  <!-- Lock body -->
  <rect x="178" y="318" width="44" height="36" rx="6" fill="#0a0d14" opacity="0.9"/>
  <!-- Lock shackle -->
  <path d="M187 318 L187 305 C187 293 213 293 213 305 L213 318"
        fill="none" stroke="#0a0d14" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <!-- Lock keyhole -->
  <circle cx="200" cy="330" r="6" fill="#e63946"/>
  <rect x="197" y="334" width="6" height="10" rx="2" fill="#e63946"/>

  <!-- Outer orbit ring -->
  <circle cx="200" cy="320" r="108" fill="none" stroke="#e63946"
          stroke-width="1" stroke-dasharray="4 8" opacity="0.4"/>

  <!-- Chain nodes on orbit -->
  <circle cx="200" cy="212" r="5" fill="#e63946" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="304" cy="268" r="5" fill="#e63946" opacity="0.6"/>
  <circle cx="304" cy="372" r="5" fill="#e63946" opacity="0.6"/>
  <circle cx="200" cy="428" r="5" fill="#e63946" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="96"  cy="372" r="5" fill="#e63946" opacity="0.6"/>
  <circle cx="96"  cy="268" r="5" fill="#e63946" opacity="0.6"/>

  <!-- ─── RIGHT SIDE: Text & Info ─── -->

  <!-- Main title -->
  <text x="460" y="250" fill="white" font-family="'Courier New', monospace"
        font-size="92" font-weight="bold" letter-spacing="-2"
        filter="url(#textGlow)" opacity="0.95">DeadDrop</text>

  <!-- Red accent line under title -->
  <rect x="460" y="268" width="520" height="3" fill="#e63946" rx="2" opacity="0.8"/>

  <!-- Tagline -->
  <text x="460" y="318" fill="#e63946" font-family="'Courier New', monospace"
        font-size="20" letter-spacing="4" opacity="0.9">
    CONFIDENTIAL WHISTLEBLOWING ON CHAINLINK
  </text>

  <!-- Three feature pills -->
  <!-- Pill 1 -->
  <rect x="460" y="355" width="195" height="40" rx="20" fill="#1f2937" stroke="#e63946" stroke-width="1" opacity="0.9"/>
  <text x="557" y="381" text-anchor="middle" fill="white"
        font-family="'Courier New', monospace" font-size="13" letter-spacing="1">
    🔒 TEE Verified
  </text>

  <!-- Pill 2 -->
  <rect x="670" y="355" width="195" height="40" rx="20" fill="#1f2937" stroke="#ff8c42" stroke-width="1" opacity="0.9"/>
  <text x="767" y="381" text-anchor="middle" fill="white"
        font-family="'Courier New', monospace" font-size="13" letter-spacing="1">
    🤖 AI Attested
  </text>

  <!-- Pill 3 -->
  <rect x="880" y="355" width="195" height="40" rx="20" fill="#1f2937" stroke="#e63946" stroke-width="1" opacity="0.9"/>
  <text x="977" y="381" text-anchor="middle" fill="white"
        font-family="'Courier New', monospace" font-size="13" letter-spacing="1">
    ⛓ On-Chain
  </text>

  <!-- Flow diagram -->
  <g opacity="0.75">
    <!-- Step boxes -->
    <rect x="460" y="424" width="148" height="52" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="534" y="445" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="10">STEP 1</text>
    <text x="534" y="462" text-anchor="middle" fill="white" font-family="monospace" font-size="12">Verify Employee</text>
    <text x="534" y="474" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Confidential HTTP</text>

    <!-- Arrow -->
    <line x1="612" y1="450" x2="632" y2="450" stroke="#e63946" stroke-width="2"/>
    <polygon points="632,445 642,450 632,455" fill="#e63946"/>

    <rect x="644" y="424" width="148" height="52" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="718" y="445" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="10">STEP 2</text>
    <text x="718" y="462" text-anchor="middle" fill="white" font-family="monospace" font-size="12">AI Assessment</text>
    <text x="718" y="474" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Confidential AI TEE</text>

    <!-- Arrow -->
    <line x1="796" y1="450" x2="816" y2="450" stroke="#e63946" stroke-width="2"/>
    <polygon points="816,445 826,450 816,455" fill="#e63946"/>

    <rect x="828" y="424" width="148" height="52" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="902" y="445" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="10">STEP 3</text>
    <text x="902" y="462" text-anchor="middle" fill="white" font-family="monospace" font-size="12">Write On-Chain</text>
    <text x="902" y="474" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Sepolia · UNKNOWABLE</text>
  </g>

  <!-- Contract address -->
  <text x="460" y="530" fill="#374151" font-family="monospace" font-size="11" letter-spacing="1">
    Contract:
  </text>
  <text x="535" y="530" fill="#6b7280" font-family="monospace" font-size="11" letter-spacing="1">
    0x2aa4206aa0b9d2434fa96c5330c17fc23709f597 · Sepolia
  </text>

  <!-- ETHGlobal badge -->
  <rect x="460" y="558" width="160" height="28" rx="14" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="540" y="577" text-anchor="middle" fill="#6b7280"
        font-family="monospace" font-size="11" letter-spacing="1">ETHGlobal NYC 2026</text>

  <!-- Chainlink badge -->
  <rect x="632" y="558" width="140" height="28" rx="14" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="702" y="577" text-anchor="middle" fill="#375bd2"
        font-family="monospace" font-size="11" letter-spacing="1">Chainlink CRE</text>

  <!-- Corner decoration -->
  <rect x="0"    y="0"   width="60" height="4" fill="#e63946" opacity="0.6"/>
  <rect x="0"    y="0"   width="4"  height="60" fill="#e63946" opacity="0.6"/>
  <rect x="1220" y="0"   width="60" height="4"  fill="#e63946" opacity="0.6"/>
  <rect x="1276" y="0"   width="4"  height="60" fill="#e63946" opacity="0.6"/>
  <rect x="0"    y="636" width="60" height="4"  fill="#e63946" opacity="0.3"/>
  <rect x="0"    y="580" width="4"  height="60" fill="#e63946" opacity="0.3"/>
  <rect x="1220" y="636" width="60" height="4"  fill="#e63946" opacity="0.3"/>
  <rect x="1276" y="580" width="4"  height="60" fill="#e63946" opacity="0.3"/>
</svg>
